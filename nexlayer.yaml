application:
  name: america250
  pods:
  - name: web
    image: mirror.gcr.io/library/golang:1.23-alpine
    path: /
    servicePorts:
    - 8080
    vars:
      DATABASE_URL: "postgres://postgres:postgres@postgres.pod:5432/america250?sslmode=disable"
      BIND_ADDR: ":8080"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: america250
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
    - name: america250-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
