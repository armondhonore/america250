application:
  name: america250
  pods:
    - name: app
      image: "registry.nexlayer.io/user_01kece1xyh817dwff7wnarhkxd/america250:19f2ec8eb5e"
      path: /
      servicePorts:
        - 8080
      vars:
        PORT: "8080"
        DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres.pod:5432/${POSTGRES_DB}?sslmode=disable"
    - name: postgres
      image: mirror.gcr.io/library/postgres:16-alpine
      servicePorts:
        - 5432
      vars:
        POSTGRES_USER: app
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: america250
      volumes:
        - name: america250-postgres-data
          size: 10Gi
          mountPath: /var/lib/postgresql